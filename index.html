
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Global styles */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#f4f6fb;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:650px;
max-width:95%;
}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* Input section */

.input-section{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:20px;
}

textarea{
padding:12px;
height:90px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

/* Add button */

.add-btn{
background:#4CAF50;
color:white;
}

/* Search bar */

#search{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
width:100%;
}

/* Notes */

.note{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.note-text{
flex:1;
}

.actions button{
margin-left:5px;
}

/* Buttons */

.delete{
background:red;
color:white;
}

.edit{
background:#2196F3;
color:white;
}

/* Mobile responsive */

@media(max-width:600px){

h1{
font-size:22px;
}

textarea{
height:70px;
}

button{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>📝 Smart Notes</h1>

<input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

<div class="input-section">
<textarea id="noteInput" placeholder="Write a note..."></textarea>
<button class="add-btn" onclick="addNote()">Add Note</button>
</div>

<div id="notesContainer"></div>

</div>

<script>

/* Load notes from localStorage */

let notes = JSON.parse(localStorage.getItem("notes")) || [];

const container = document.getElementById("notesContainer");

displayNotes();

/* Add note */

function addNote(){

let input = document.getElementById("noteInput");
let text = input.value.trim();

if(text === ""){
alert("Write something first!");
return;
}

notes.push(text);

localStorage.setItem("notes", JSON.stringify(notes));

input.value="";

displayNotes();
}

/* Display notes */

function displayNotes(){

container.innerHTML="";

notes.forEach((note,index)=>{

let div=document.createElement("div");
div.className="note";

div.innerHTML=`
<span class="note-text">${note}</span>

<div class="actions">
<button class="edit" onclick="editNote(${index})">Edit</button>
<button class="delete" onclick="deleteNote(${index})">Delete</button>
</div>
`;

container.appendChild(div);

});
}

/* Delete note */

function deleteNote(index){

notes.splice(index,1);

localStorage.setItem("notes",JSON.stringify(notes));

displayNotes();
}

/* Edit note */

function editNote(index){

let newNote = prompt("Edit your note:", notes[index]);

if(newNote !== null){

notes[index] = newNote;

localStorage.setItem("notes",JSON.stringify(notes));

displayNotes();

}

}

/* Search notes */

function searchNotes(){

let search=document.getElementById("search").value.toLowerCase();

let noteElements=document.querySelectorAll(".note");

noteElements.forEach(note=>{

let text=note.innerText.toLowerCase();

note.style.display = text.includes(search) ? "flex" : "none";

});
}

</script>

</body>
</html>
